<!doctype html>
<html lang="zh-Hant-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='0.9em' font-size='90'%3E%F0%9F%8E%BE%3C/text%3E%3C/svg%3E"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Noto+Sans+TC:wght@400;500;700;900&display=swap"
      rel="stylesheet"
    />
    <title>球局｜台北市網球</title>
  </head>
  <body>
    <div id="app">
      <header class="app-header">
        <a class="app-brand" href="#tab-map" aria-label="球局首頁">
          <span class="app-brand__ball" aria-hidden="true">◔</span>
          <span>球局</span>
        </a>
        <div class="city-label" aria-label="目前城市：台北市">台北市</div>
        <div class="app-header__actions">
          <button type="button" id="use-my-location" class="location-button">使用我的位置</button>
          <button type="button" id="open-session" class="open-session-button">開球局</button>
          <button type="button" id="open-my-sessions" class="my-sessions-button">我的球局</button>
        </div>
      </header>

      <main id="tab-map" class="map-page">
        <div id="map" role="region" aria-label="台北市球局地圖"></div>

        <section class="map-toolbar" aria-label="尋找球局篩選">
          <label class="filter-control">
            <span>行政區</span>
            <select id="district-filter"><option value="">全部行政區</option></select>
          </label>
          <label class="filter-control">
            <span>球場</span>
            <select id="court-filter"><option value="">全部球場</option></select>
          </label>
          <label class="filter-control filter-control--date">
            <span>日期</span>
            <input id="date-filter" type="date" />
          </label>
          <button type="button" id="level-chip" class="filter-chip" aria-expanded="false" aria-controls="level-popover">
            程度：<b id="band-label">全部</b>
          </button>
          <div class="type-chips" role="group" aria-label="球局類型">
            <button type="button" class="chip-type" data-type="單打" aria-pressed="false">單打</button>
            <button type="button" class="chip-type" data-type="對拉" aria-pressed="false">對拉</button>
            <button type="button" class="chip-type" data-type="雙打" aria-pressed="false">雙打</button>
            <button type="button" class="chip-type" data-type="練球" aria-pressed="false">練球</button>
          </div>
          <button type="button" id="filters-reset" class="filters-reset">清除</button>
        </section>

        <div id="level-popover" class="level-popover" hidden>
          <p>依 NTRP 程度篩選</p>
          <div id="band-options"></div>
        </div>

        <div id="nearby-sessions-backdrop" class="nearby-sessions__backdrop" aria-hidden="true" hidden></div>
        <aside id="nearby-sessions-drawer" class="nearby-sessions" aria-label="附近球局"></aside>
        <div id="map-data-status" role="status" aria-live="polite" hidden></div>
      </main>

      <section id="my-sessions-page" class="my-sessions-page" aria-label="我的球局" hidden>
        <div id="my-sessions-root" class="my-sessions-shell" tabindex="-1"></div>
      </section>

      <nav class="bottom-navigation" aria-label="主要導覽">
        <button type="button" id="map-tab" data-testid="map-tab" class="bottom-navigation__item" aria-controls="tab-map" aria-current="page">
          <span aria-hidden="true">⌖</span><span>找球局</span>
        </button>
        <button type="button" id="create-session-tab" data-testid="create-session-tab" class="bottom-navigation__item" aria-controls="sheet-root" aria-haspopup="dialog">
          <span aria-hidden="true">＋</span><span>開球局</span>
        </button>
        <button type="button" id="my-sessions-tab" data-testid="my-sessions-tab" class="bottom-navigation__item" aria-controls="my-sessions-page" aria-current="false" aria-label="我的球局">
          <span aria-hidden="true">◎</span><span>我的球局</span><span id="my-sessions-badge" class="my-sessions-badge" aria-hidden="true" hidden></span>
        </button>
      </nav>
      <div class="site-links">
        <a id="support-link" class="site-link" hidden>聯絡支援</a>
        <a id="privacy-link" class="site-link" href="/privacy.html">隱私權政策</a>
      </div>
      <span id="my-sessions-badge-status" class="visually-hidden" role="status" aria-live="polite" aria-atomic="true"></span>

      <div id="sheet-root"></div>
      <div id="modal-root"></div>
      <div id="toast-root" aria-live="polite" aria-atomic="true"></div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
